name: watermark
description: "WaterMark — embed and recover invisible authorship watermarks, fully offline."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local engine packages (the tested, offline core)
  watermark_engine:
    path: packages/watermark_engine
  format_handlers:
    path: packages/format_handlers
  signature_storage:
    path: packages/signature_storage

  # Platform integration — all offline-capable
  file_picker: ^8.1.0
  share_plus: ^10.1.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  syncfusion_flutter_pdf: ^33.2.13
  flutter_secure_storage: ^10.3.1
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    # Unicode TrueType font used to regenerate watermarked PDFs so zero-width
    # characters survive the text layer. DejaVu Sans (permissive license).
    - assets/fonts/DejaVuSans.ttf

flutter_launcher_icons:
  image_path: "assets/appLogo/Watermarked logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/appLogo/Watermarked logo.png"
    background_color: "#0E7C86"
    theme_color: "#0E7C86"
  windows:
    generate: true
    image_path: "assets/appLogo/Watermarked logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/appLogo/Watermarked logo.png"
