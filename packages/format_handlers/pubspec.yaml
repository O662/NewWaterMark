name: format_handlers
description: >-
  Offline, pure-Dart document format handlers (txt/md, html, docx, xlsx, pptx)
  that embed and extract watermarks via the watermark_engine. PDF is handled by
  an injected Flutter implementation (see PdfHandlerUnavailable).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  archive: ^3.6.1
  html: ^0.15.4
  watermark_engine:
    path: ../watermark_engine
  xml: ^6.5.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
