name: signature_storage
description: >-
  Offline persistence for named signature templates with one default, stored as
  JSON. Pure-Dart logic; the dart:io file backend is split out so a web build can
  swap in another backend.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  path: ^1.9.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
